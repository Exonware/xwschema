# Source size (src/*): ~351.6 KB
[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "xwschema"
dynamic = [
    "version",
]
description = "Convenience wrapper for exonware-xwschema - provides 'import xwschema' alias"
readme = "README.md"
requires-python = ">=3.12"
keywords = [
    "schema",
    "validation",
    "structure",
    "definition",
    "data-types",
    "exonware",
]
classifiers = []
dependencies = [
    "exonware-xwschema",
]
exonware-xwdata = "514480 ; 0.49 MB"
authors = []
"{ name" = "eXonware Backend Team"

[project.license]
text = "MIT"

[project.optional-dependencies]
dev = [
    "exonware-xwschema[dev]",
]
"black>" = [
    "exonware-xwschema[black>]",
]
"exonware-xwdata[dev]" = [
    "exonware-xwschema[exonware-xwdata[dev]]",
]
exonware-xwlazy = [
    "exonware-xwschema[exonware-xwlazy]",
]
"isort>" = [
    "exonware-xwschema[isort>]",
]
"mypy>" = [
    "exonware-xwschema[mypy>]",
]
"pytest>" = [
    "exonware-xwschema[pytest>]",
]
"pytest-asyncio>" = [
    "exonware-xwschema[pytest-asyncio>]",
]
"pytest-cov>" = [
    "exonware-xwschema[pytest-cov>]",
]
lazy = [
    "exonware-xwschema[lazy]",
]
"exonware-xwdata[lazy]" = [
    "exonware-xwschema[exonware-xwdata[lazy]]",
]
full = [
    "exonware-xwschema[full]",
]
aiofiles = [
    "exonware-xwschema[aiofiles]",
]
attrs = [
    "exonware-xwschema[attrs]",
]
bcrypt = [
    "exonware-xwschema[bcrypt]",
]
brotli = [
    "exonware-xwschema[brotli]",
]
cachebox = [
    "exonware-xwschema[cachebox]",
]
cachetools = [
    "exonware-xwschema[cachetools]",
]
cbor2 = [
    "exonware-xwschema[cbor2]",
]
cryptography = [
    "exonware-xwschema[cryptography]",
]
dicttoxml = [
    "exonware-xwschema[dicttoxml]",
]
"exonware-xwdata[full]" = [
    "exonware-xwschema[exonware-xwdata[full]]",
]
httpx = [
    "exonware-xwschema[httpx]",
]
hyperlight_hyperjson = [
    "exonware-xwschema[hyperlight_hyperjson]",
]
json5 = [
    "exonware-xwschema[json5]",
]
msgpack = [
    "exonware-xwschema[msgpack]",
]
msgspec = [
    "exonware-xwschema[msgspec]",
]
opentelemetry-api = [
    "exonware-xwschema[opentelemetry-api]",
]
orjson = [
    "exonware-xwschema[orjson]",
]
psutil = [
    "exonware-xwschema[psutil]",
]
pylru = [
    "exonware-xwschema[pylru]",
]
pymongo = [
    "exonware-xwschema[pymongo]",
]
PyYAML = [
    "exonware-xwschema[PyYAML]",
]
rich = [
    "exonware-xwschema[rich]",
]
tomli = [
    "exonware-xwschema[tomli]",
]
tomli-w = [
    "exonware-xwschema[tomli-w]",
]
xmltodict = [
    "exonware-xwschema[xmltodict]",
]
zstandard = [
    "exonware-xwschema[zstandard]",
]

[project.urls]
Homepage = "https://exonware.com"
Repository = "https://github.com/exonware/xwschema"
Documentation = "https://github.com/exonware/xwschema#readme"
Subtree = "https://github.com/exonware/xwschema.git"

[project.entry-points.xwsystem.schema_validators]
xwschema = "exonware.xwschema.validator:get_schema_validator"

[tool.black]
line-length = 88
target-version = [
    "py38",
]

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "0.4.0.1"
mypy_path = "src"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true

[tool.pytest.ini_options]
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
]
python_classes = [
    "Test*",
]
python_functions = [
    "test_*",
]
addopts = "-v --tb=short -x --strict-markers"
markers = []

[tool.hatch.version]
path = "src/exonware/xwschema/version.py"

[tool.hatch.build.targets.wheel]
only-include = [
    "README.md",
    "src/xwschema_wrapper.py",
]

[tool.hatch.build.targets.sdist]
include = []
