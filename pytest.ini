[pytest]
# Test discovery and execution
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers for test categorization
markers =
    xwschema_core: Core functionality and integration tests
    xwschema_unit: Unit tests for individual components
    xwschema_registry: Registry and catalog tests (SchemaCatalog, apply_migration)
    xwschema_integration: Integration tests across modules
    xwschema_advance: Advance quality tests (v1.0.0+)
    xwschema_security: Security excellence tests (Priority #1)
    xwschema_usability: Usability excellence tests (Priority #2)
    xwschema_maintainability: Maintainability excellence tests (Priority #3)
    xwschema_performance: Performance excellence tests (Priority #4)
    xwschema_extensibility: Extensibility excellence tests (Priority #5)

# Test output configuration
addopts =
    -v
    --tb=short
    --strict-markers
    -x

